name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Extract version from tag
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build EXE with PyInstaller
        run: python -m PyInstaller pyinstaller.spec --distpath dist
        working-directory: discord_notif/installer

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer with NSIS
        run: makensis /DAPP_VERSION=${{ env.VERSION }} discord_ping_notifier.nsis
        working-directory: discord_notif/installer

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} `
            "DiscordPingNotifier-${{ env.VERSION }}-installer.exe" `
            --title "v${{ env.VERSION }}" `
            --generate-notes
        working-directory: discord_notif/installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
